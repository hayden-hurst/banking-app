name: Build & Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Build Spring Boot jar
      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: backend

      # 4. Generate short commit SHA tag
      - name: Generate image tag
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # 5. Log into GitHub Container Registry (FIXED)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Build Docker image
      - name: Build Docker image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/banking-backend:latest \
          -t ghcr.io/${{ github.repository_owner }}/banking-backend:${{ env.IMAGE_TAG }} \
          backend/

      # 7. Push Docker image tags
      - name: Push Docker images
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/banking-backend:latest
          docker push ghcr.io/${{ github.repository_owner }}/banking-backend:${{ env.IMAGE_TAG }}