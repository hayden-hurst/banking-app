services:
  db:
    image: postgres:16
    container_name: banking-db
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dev -d banking" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev

      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/banking
      SPRING_DATASOURCE_USERNAME: dev
      SPRING_DATASOURCE_PASSWORD: dev

      APP_ENCRYPTION_SECRET: 12345678901234567890123456789012
      JWT_SECRET: superSecretKeyThatIsExactly32Chars!!
      JWT_EXPIRATION: 3600000
